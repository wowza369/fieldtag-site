<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — FieldTag</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0F1117; --bg2: #141720; --border: #2E3347; --accent: #2E86DE; --text: #F9FAFB; --muted: #9CA3AF; --dim: #6B7280; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: var(--bg2); border-bottom: 0.5px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; }
    .nav-logo { font-size: 16px; font-weight: 700; letter-spacing: 3px; color: var(--accent); font-family: Georgia, serif; text-decoration: none; }
    .content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; }
    .inner { max-width: 400px; }
    .code { font-size: 72px; font-weight: 700; color: var(--accent); letter-spacing: -0.04em; margin-bottom: 12px; opacity: 0.4; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
    p { font-size: 15px; color: var(--muted); margin-bottom: 28px; }
    .btn { display: inline-block; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; padding: 12px 24px; border-radius: 10px; text-decoration: none; }
    .btn:hover { opacity: 0.85; }
    footer { background: #0A0D13; border-top: 0.5px solid var(--border); padding: 20px 24px; text-align: center; font-size: 12px; color: var(--dim); }
  </style>
</head>
<body>
  <nav><a href="/index.html" class="nav-logo">FIELD-TAG</a></nav>
  <div class="content">
    <div class="inner">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has moved.</p>
      <a href="/index.html" class="btn">Back to home</a>
    </div>
  </div>
  <footer>© 2026 FieldTag</footer>
</body>
</html>
